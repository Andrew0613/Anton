version: 1
entrypoint:
  path: AGENTS.md
tasks:
  root: .anton/tasks
  planning_mode: run_manifest
run:
  enabled: true
  manifest: run.json
  receipts_dir: receipts
threads:
  default_project_strategy: repo-root
gates:
  - name: smoke
    type: command
    required_for: [handoff]
    command:
      argv: ["true"]
gate_profiles:
  handoff:
    required: [smoke]
